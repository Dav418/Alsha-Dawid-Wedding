name: Alisha & Dawid wedding website
description: Alisha & Dawid wedding website — Flutter web (mobile-first). Run codegen after changes to routes/models/providers that use generators.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 10.3.0+ uses Flutter APIs (e.g. MediaQuery.heightOf) not in older SDKs — pin below 10.3
  # until IDE Flutter matches a recent stable, or upgrade Flutter and bump this.
  auto_route: ">=10.2.0 <10.3.0"

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  google_fonts: ^6.2.1
  # 0.21.3+1 requires Flutter >=3.32; keep ^0.21.2 until the SDK is upgraded.
  flutter_hooks: ^0.21.2
  url_launcher: ^6.3.1
  confetti: ^0.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.5.4
  riverpod_generator: ^2.6.4
  auto_route_generator: ">=10.0.0 <10.2.5"
  freezed: ^2.5.8
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - lib/assets/home/
    - lib/assets/wedding_party/
