name: wedding_invoice
description: Wedding invoice — Flutter web (mobile-first). Run codegen after changes to routes/models/providers that use generators.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  auto_route: ^10.3.0

  freezed_annotation: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  build_runner: ^2.5.4
  riverpod_generator: ^2.6.4
  auto_route_generator: ">=10.0.0 <10.2.5"
  freezed: ^2.5.8

flutter:
  uses-material-design: true
